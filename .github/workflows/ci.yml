name: CI/CD Pipeline - Build and Package

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push MySQL Image
        uses: docker/build-push-action@v5
        with:
          context: ./Dockerfiles/mysql
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/mysql:latest

      - name: Build and Push Nginx Image
        uses: docker/build-push-action@v5
        with:
          context: ./Dockerfiles/nginx
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/nginx:latest
          

      - name: Build and Push WordPress Image
        uses: docker/build-push-action@v5
        with:
          context: ./Dockerfiles/wordpress
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/wordpress:latest

  helm-lint:
    name: Lint & Validate Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0
          
      - name: Lint Helm Chart
        run: helm lint ./wp-arpit-chart
